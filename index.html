<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AE Companion</title>

<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="container">

<header>

<img src="assets/logo.svg" alt="AE Companion Logo" class="logo">

<h1>AE Companion</h1>

<p>Track. Plan. Conquer.</p>

</header>

<div class="card">
<h2>👤 Giocatore</h2>

<p id="player-name"></p>

<p>🌍 Terreni: <span id="parcels"></span></p>

<p>👑 Badge: <span id="badges"></span></p>

<p>⚡ Boost: <span id="boost"></span></p>

<p>🎯 Mayor Target:
<span id="mayor"></span></p>

</div>

<div class="progress-card">
<section class="card">

    <h2>💰 Rendita</h2>

    <div class="income-grid">

        <div class="income-box">
            <span class="label">OGGI</span>
            <span class="value" id="dailyIncome">0,16 €</span>
        </div>

        <div class="income-box">
            <span class="label">MESE</span>
            <span class="value" id="monthlyIncome">4,80 €</span>
        </div>

        <div class="income-box">
            <span class="label">ANNO</span>
            <span class="value" id="yearlyIncome">58,40 €</span>
        </div>

    </div>

</section>
  
<h3>Prossimo obiettivo</h3>

<div class="progress">

<div class="progress-fill" id="progress-fill"></div>

</div>

<p id="progress-text"></p>

</div>

</div>

<script src="js/app.js"></script>

</body>
</html>
