<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AE Companion</title>

<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="container">

<header>

<img src="assets/logo.svg" alt="AE Companion Logo" class="logo">

<h1>AE Companion</h1>

<p>Track. Plan. Conquer.</p>

</header>

<div class="card player-card">

    <h2 id="player-name"></h2>

    <div class="player-total">
        🌍 Terreni
        <span id="parcels"></span>
    </div>

    <hr>

    <div class="rarity-grid">

        <div>🟢 <span id="common-count"></span></div>

        <div>🔵 <span id="rare-count"></span></div>

        <div>🟣 <span id="epic-count"></span></div>

        <div>🟡 <span id="legendary-count"></span></div>

    </div>

    <hr>

    <div class="stats-grid">

        <div>👑 <span id="badges"></span></div>

        <div>⚡ <span id="boost"></span></div>

        <div>🎯 <span id="mayor"></span></div>

    </div>

</div>
<div class="progress-card">
<section class="card">

    <h2>💰 Rendita</h2>

    <div class="income-grid">

        <div class="income-box">
            <span class="label">OGGI</span>
            <span class="value" id="dailyIncome"></span>
        </div>

        <div class="income-box">
            <span class="label">MESE</span>
            <span class="value" id="monthlyIncome"></span>
        </div>

        <div class="income-box">
            <span class="label">ANNO</span>
            <span class="value" id="yearlyIncome"></span>
        </div>

    </div>


<p id="boost-info"></p>

</section>

<!-- NUOVA CARD -->

<div class="card">

<h2>🎯 Strategia</h2>

<div class="strategy-grid">

    <div class="strategy-box">
        <div class="strategy-title">Terreni</div>
        <div class="strategy-value" id="landsRemaining"></div>
    </div>

    <div class="strategy-box">
        <div class="strategy-title">Costo</div>
        <div class="strategy-value" id="abNeeded"></div>
    </div>

    <div class="strategy-box">
        <div class="strategy-title">AB/giorno</div>
        <div class="strategy-value" id="dailyAB"></div>
    </div>

    <div class="strategy-box">
        <div class="strategy-title">Tempo</div>
        <div class="strategy-value" id="daysRemaining"></div>
    </div>

</div>

<!-- FINE NUOVA CARD -->

<h3>Prossimo obiettivo</h3>

<div class="progress">

<div class="progress-fill" id="progress-fill"></div>

</div>

<p id="progress-text"></p>

</div>

</div>

<script src="js/config.js"></script>
<script src="js/data.js"></script>
<script src="js/calculator.js"></script>
<script src="js/income.js"></script>
<script src="js/app.js"></script>
    
</body>
</html>
