<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AE Companion</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    }

    body{
      background:#0F172A;
      color:#F8FAFC;
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:20px;
    }

    .card{
      width:100%;
      max-width:420px;
      background:#1E293B;
      border-radius:22px;
      padding:25px;
      box-shadow:0 15px 40px rgba(0,0,0,.35);
    }

    h1{
      text-align:center;
      color:#3B82F6;
      font-size:34px;
      margin-bottom:6px;
    }

    h2{
      text-align:center;
      color:#94A3B8;
      font-size:15px;
      font-weight:400;
      margin-bottom:30px;
    }

    .stat{
      background:#0F172A;
      border-radius:16px;
      padding:16px;
      margin-bottom:14px;
    }

    .label{
      color:#94A3B8;
      font-size:14px;
    }

    .value{
      font-size:30px;
      font-weight:bold;
      margin-top:6px;
    }

    .footer{
      margin-top:25px;
      text-align:center;
      color:#64748B;
      font-size:13px;
    }
  </style>
</head>

<body>

<div class="card">

<h1>AE Companion</h1>

<h2>Powered by Alessandro Chindemi</h2>

<div class="stat">
<div class="label">🌍 Parcels</div>
<div class="value">135</div>
</div>

<div class="stat">
<div class="label">🏆 Badges</div>
<div class="value">6</div>
</div>

<div class="stat">
<div class="label">⚡ Current Boost</div>
<div class="value">x10</div>
</div>

<div class="footer">
Version 0.1 • Genesis
</div>

</div>

</body>
</html>
